# GitLab CI/CD Pipeline for Kaleidoswap SDK (UniFFI)
# This pipeline builds and publishes the Rust-based SDKs with UniFFI bindings
#
# On tag push:
#   update-specs → generate-models → build → deploy

stages:
  - .pre       # update-specs
  - generate   # generate-models
  - test
  - build
  - deploy

variables:
  RUST_VERSION: "1.85"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  # Use Docker image's default Rust installation paths
  # CARGO_HOME and RUSTUP_HOME should not be overridden

# Default tags for runners
default:
  tags:
    - linux-runner

# Cache Rust dependencies
.rust_cache: &rust_cache
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/

# Workflow rules: Run on tags and main/dev branches
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - when: never

# ---------------------------------------------------------------------------
# TEST STAGE
# ---------------------------------------------------------------------------

test:core:
  stage: test
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  script:
    - echo "🦀 Testing Core Rust Library..."
    - cargo test -p kaleidoswap-core --release
  artifacts:
    reports:
      junit: target/test-results.xml

test:uniffi:
  stage: test
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  needs:
    - job: test:core
      optional: true
  script:
    - echo "🔗 Testing UniFFI Bindings..."
    - cargo test -p kaleidoswap-uniffi --release

lint:
  stage: test
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  script:
    - echo "🔍 Running Clippy..."
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -D warnings
  allow_failure: true

format:
  stage: test
  image: rust:${RUST_VERSION}
  script:
    - echo "✨ Checking formatting..."
    - rustup component add rustfmt
    - cargo fmt --all -- --check
  allow_failure: true

# ---------------------------------------------------------------------------
# SPEC & MODEL GENERATION (tag pipelines only)
# ---------------------------------------------------------------------------

# Download OpenAPI specs from GitHub
update-specs:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash python3 py3-yaml
  script:
    - echo "📥 Downloading OpenAPI specs from GitHub..."
    - chmod +x scripts/update-openapi-specs.sh
    - ./scripts/update-openapi-specs.sh
  artifacts:
    paths:
      - specs/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# Generate Rust models from OpenAPI specs
generate-models:
  stage: generate
  image: python:3.11-slim
  needs:
    - job: update-specs
      artifacts: true
  before_script:
    - pip install pyyaml
  script:
    - echo "🔧 Generating Rust models from OpenAPI specs..."
    - python scripts/generate_models.py
  artifacts:
    paths:
      - crates/kaleidoswap-core/src/models/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------------------------

build:core:
  stage: build
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  script:
    - echo "🦀 Building Core Library..."
    - cargo build -p kaleidoswap-core --release
  artifacts:
    paths:
      - target/release/libkaleidoswap_core.*
    expire_in: 1 week

build:python:
  stage: build
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  needs:
    - job: build:core
      optional: true
    - job: generate-models
      optional: true
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip python3-venv
    - pip3 install maturin
  script:
    - echo "🐍 Building Python Bindings (Maturin + UniFFI)..."
    - cd bindings/python
    - maturin build --release --strip
  artifacts:
    paths:
      - target/wheels/
    expire_in: 1 week

build:typescript:
  stage: build
  image: rust:${RUST_VERSION}
  <<: *rust_cache
  needs:
    - job: build:core
      optional: true
    - job: generate-models
      optional: true
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y nodejs npm
    - npm install -g pnpm
  script:
    - echo "📦 Building TypeScript Bindings..."
    - cargo build -p kaleidoswap-typescript --release
    # Generate TypeScript types (requires uniffi-bindgen-ts when available)
    - cd bindings/typescript
    - pnpm install || true
  artifacts:
    paths:
      - bindings/typescript/
    exclude:
      - bindings/typescript/node_modules/**
    expire_in: 1 week

# ---------------------------------------------------------------------------
# DEPLOY STAGE
# ---------------------------------------------------------------------------

deploy:pypi:
  stage: deploy
  image: rust:${RUST_VERSION}
  needs:
    - job: build:python
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip3 install maturin twine
  script:
    - echo "🚀 Publishing to PyPI..."
    - cd bindings/python
    # --skip-existing allows re-running pipelines without failing if version exists
    - maturin publish --username __token__ --password ${PYPI_TOKEN} --skip-existing || twine upload --skip-existing target/wheels/*
  rules:
    - if: $CI_COMMIT_TAG
  environment:
    name: pypi
    url: https://pypi.org/project/kaleidoswap/

deploy:npm:
  stage: deploy
  image: node:${NODE_VERSION}
  needs:
    - job: build:typescript
      artifacts: true
  before_script:
    - npm install -g pnpm
  script:
    - echo "🚀 Publishing to npm..."
    - cd bindings/typescript
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    
    # Determine tag based on version pattern
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Detected version: $VERSION"
      if [[ "$VERSION" =~ - ]]; then
        TAG="beta"
      else
        TAG="latest"
      fi
      echo "Publishing with tag: $TAG"
      pnpm publish --tag $TAG --access public --no-git-checks
  rules:
    - if: $CI_COMMIT_TAG
  environment:
    name: npm
    url: https://www.npmjs.com/package/@kaleidoswap/sdk
