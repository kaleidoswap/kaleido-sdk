# GitLab CI/CD Pipeline for Kaleidoswap SDK (UniFFI)
# This pipeline builds and publishes the Rust-based SDKs (core, python, node)

stages:
  - test
  - build
  - deploy

variables:
  RUST_VERSION: "1.75"
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  # Directory where the new UniFFI code lives
  POC_DIR: "rust-poc"

# Default tags for runners
default:
  tags:
    - linux-runner

# Workflow rules: Run on tags, triggers, and main/dev branches
workflow:
  rules:
    - if: $TRIGGER_SOURCE == "kaleidoswap-maker"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - when: never

# ---------------------------------------------------------------------------
# TEST STAGE
# ---------------------------------------------------------------------------

test:core:
  stage: test
  image: rust:${RUST_VERSION}
  script:
    - echo "🦀 Testing Core Rust Library..."
    - cd ${POC_DIR}/kaleidoswap-core
    - cargo test --release
  cache:
    paths:
      - ${POC_DIR}/target/

# ---------------------------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------------------------

build:python:
  stage: build
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm-slim
  script:
    - echo "🐍 Building Python Bindings (Maturin)..."
    - pip install maturin
    - cd ${POC_DIR}/kaleidoswap-python
    - maturin build --release --strip
  artifacts:
    paths:
      - ${POC_DIR}/kaleidoswap-python/target/wheels/
    expire_in: 1 week
  cache:
    paths:
      - ${POC_DIR}/target/

build:node:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - echo "📦 Building Node.js Bindings (NAPI-RS)..."
    - cd ${POC_DIR}/kaleidoswap-node
    - npm install
    - npm run build
  artifacts:
    paths:
      - ${POC_DIR}/kaleidoswap-node/
    exclude:
      - ${POC_DIR}/kaleidoswap-node/node_modules/**
    expire_in: 1 week

# ---------------------------------------------------------------------------
# DEPLOY STAGE
# ---------------------------------------------------------------------------

deploy:pypi:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-bookworm-slim
  needs:
    - job: build:python
      artifacts: true
  script:
    - echo "🚀 Publishing to PyPI..."
    - pip install maturin
    - cd ${POC_DIR}/kaleidoswap-python
    # --skip-existing allows re-running pipelines without failing if version exists
    - maturin publish --username __token__ --password ${PYPI_TOKEN} --skip-existing
  rules:
    - if: $CI_COMMIT_TAG
    - if: $TRIGGER_SOURCE == "kaleidoswap-maker"
  environment:
    name: pypi
    url: https://pypi.org/project/kaleidoswap-sdk/

deploy:npm:
  stage: deploy
  image: node:${NODE_VERSION}
  needs:
    - job: build:node
      artifacts: true
  script:
    - echo "🚀 Publishing to npm..."
    - cd ${POC_DIR}/kaleidoswap-node
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    
    # Determine tag based on version pattern
    # -rc, -beta, -alpha -> "beta" tag
    # otherwise -> "latest"
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Detected version: $VERSION"
      if [[ "$VERSION" =~ - ]]; then
        TAG="beta"
      else
        TAG="latest"
      fi
      echo "Publishing with tag: $TAG"
      npm publish --tag $TAG --access public
  rules:
    - if: $CI_COMMIT_TAG
  environment:
    name: npm
    url: https://www.npmjs.com/package/@kaleidoswap/sdk-poc
```
