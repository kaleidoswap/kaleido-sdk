# GitLab CI/CD Pipeline for Kaleidoswap SDK
#
# Pipelines:
#   - On push/MR: test & lint
#   - On OpenAPI spec changes: regenerate SDK models
#   - On tag: update-specs → generate-models → build → deploy

stages:
  - .pre # update-specs
  - generate # generate-models
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# Default tags for runners
default:
  tags:
    - linux-runner

.python_sdk_uv_setup: &python_sdk_uv_setup
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"

# Workflow rules: Run on tags, merge requests, main/dev, and any branch push
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "push"
    - when: never

# ---------------------------------------------------------------------------
# SPEC & MODEL GENERATION
# ---------------------------------------------------------------------------

# Download OpenAPI specs from GitHub (tag pipelines only)
update-specs:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash git
  script:
    - echo "📥 Downloading OpenAPI specs from GitHub..."
    - chmod +x scripts/update-openapi-specs.sh
    - ./scripts/update-openapi-specs.sh
    - git diff --quiet specs/ && echo "SPECS_CHANGED=false" > specs.env || echo "SPECS_CHANGED=true" > specs.env
    - cat specs.env
  artifacts:
    reports:
      dotenv: specs.env
    paths:
      - specs/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

validate-release-version:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache bash sed
  script:
    - bash scripts/validate_release_version.sh "$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# Generate SDK models from OpenAPI specs
generate-sdk-models:
  stage: generate
  image: python:${PYTHON_VERSION}
  needs:
    - job: validate-release-version
    - job: update-specs
      artifacts: true
      optional: true
  before_script:
    - apt-get update && apt-get install -y nodejs npm curl
    - npm install -g pnpm
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd typescript-sdk && pnpm install --frozen-lockfile && cd ..
  script:
    - |
      if [[ "${SPECS_CHANGED:-true}" != "true" ]]; then
        echo "→ Specs unchanged — skipping model generation"
        exit 0
      fi
    - echo "🔧 Generating SDK models from OpenAPI specs..."
    # TypeScript SDK
    - bash scripts/generate_typescript_types.sh
    # Python SDK
    - bash scripts/generate_python_sdk_models.sh
  artifacts:
    paths:
      - typescript-sdk/src/generated/
      - python-sdk/kaleido_sdk/_generated/
    expire_in: 1 week
  rules:
    # On tag: always run after update-specs
    - if: $CI_COMMIT_TAG
    # On push: run if OpenAPI specs changed
    - if: $CI_COMMIT_BRANCH
      changes:
        - specs/**/*
        - scripts/generate_*.sh

# Check that generated models are up-to-date (MR only)
check-generated-models:
  stage: generate
  image: python:${PYTHON_VERSION}
  before_script:
    - apt-get update && apt-get install -y nodejs npm git curl
    - npm install -g pnpm
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd typescript-sdk && pnpm install --frozen-lockfile && cd ..
  script:
    - echo "🔍 Checking if generated models are up-to-date..."
    - bash scripts/generate_typescript_types.sh
    - bash scripts/generate_python_sdk_models.sh
    - |
      if ! git diff --quiet typescript-sdk/src/generated/ python-sdk/kaleido_sdk/_generated/; then
        echo "❌ Generated models are out of date!"
        echo "Run 'make generate-models' locally and commit the changes."
        git diff --stat typescript-sdk/src/generated/ python-sdk/kaleido_sdk/_generated/
        exit 1
      fi
    - echo "✅ Generated models are up-to-date"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# TEST STAGE
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# TypeScript SDK
# ---------------------------------------------------------------------------

test:typescript-sdk:
  stage: test
  image: node:${NODE_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
  before_script:
    - npm install -g pnpm
  script:
    - echo "🧪 Testing TypeScript SDK..."
    - cd typescript-sdk
    - pnpm install --frozen-lockfile
    - pnpm test:unit
  artifacts:
    reports:
      junit: typescript-sdk/test-results.xml
    when: always

check:typescript-sdk:
  stage: test
  image: node:${NODE_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
  before_script:
    - npm install -g pnpm
  script:
    - cd typescript-sdk
    - pnpm install --frozen-lockfile
    - echo "🔍 Linting TypeScript SDK..."
    - pnpm run lint
    - echo "📝 Type checking TypeScript SDK..."
    - pnpm run typecheck
    - echo "🔍 Checking TypeScript SDK formatting..."
    - pnpm run format:check
  allow_failure: true

# ---------------------------------------------------------------------------
# Python SDK (Pure Python - kaleidoswap-sdk)
# ---------------------------------------------------------------------------

test:python-sdk:
  stage: test
  image: python:${PYTHON_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
  <<: *python_sdk_uv_setup
  script:
    - echo "🧪 Testing Python SDK..."
    - cd python-sdk
    - uv sync --frozen --extra dev
    - uv run pytest tests/ -v --junitxml=test-results.xml --ignore=tests/integration -m "not integration"
  artifacts:
    reports:
      junit: python-sdk/test-results.xml
    when: always

check:python-sdk:
  stage: test
  image: python:${PYTHON_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
  <<: *python_sdk_uv_setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG
  script:
    - cd python-sdk
    - echo "🔍 Checking Python SDK formatting..."
    - uvx ruff format --check kaleido_sdk tests
    - echo "🔍 Linting Python SDK..."
    - uvx ruff check kaleido_sdk tests
    - echo "📝 Type checking Python SDK..."
    - uvx --with pydantic mypy kaleido_sdk --ignore-missing-imports
  allow_failure: true

# ---------------------------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------------------------

build:python-sdk:
  stage: build
  image: python:${PYTHON_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
    - job: test:python-sdk
  <<: *python_sdk_uv_setup
  script:
    - echo "🐍 Building Python SDK..."
    - cd python-sdk
    - uv build
  artifacts:
    paths:
      - python-sdk/dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

build:typescript-sdk:
  stage: build
  image: node:${NODE_VERSION}
  needs:
    - job: generate-sdk-models
      optional: true
      artifacts: true
    - job: test:typescript-sdk
  before_script:
    - npm install -g pnpm
  script:
    - echo "📦 Building TypeScript SDK..."
    - cd typescript-sdk
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - typescript-sdk/dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# DEPLOY STAGE (tag pipelines only - manual approval required)
# ---------------------------------------------------------------------------

deploy:pypi-sdk:
  stage: deploy
  image: python:${PYTHON_VERSION}
  needs:
    - job: build:python-sdk
      artifacts: true
  script:
    - echo "🚀 Publishing Python SDK to PyPI..."
    - pip install twine
    - twine upload --skip-existing -u __token__ -p ${PYPI_TOKEN} python-sdk/dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  environment:
    name: pypi-sdk
    url: https://pypi.org/project/kaleidoswap-sdk/

deploy:npm:
  stage: deploy
  image: node:${NODE_VERSION}
  needs:
    - job: build:typescript-sdk
      artifacts: true
  before_script:
    - npm install -g pnpm
  script:
    - echo "🚀 Publishing TypeScript SDK to npm..."
    - cd typescript-sdk
    - pnpm install --frozen-lockfile

    # Determine tag based on version pattern
    - |
      VERSION=$(node -p "require('./package.json').version")
      echo "Detected version: $VERSION"
      if [[ "$VERSION" =~ - ]]; then
        TAG="beta"
      else
        TAG="latest"
      fi
      echo "Publishing with tag: $TAG"

    # Publish to npm
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - pnpm publish --tag $TAG --access public --no-git-checks
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  environment:
    name: npm
    url: https://www.npmjs.com/package/kaleidoswap-sdk
