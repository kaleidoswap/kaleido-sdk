<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaleidoswap SDK - Integration Tests</title>
    <style>
      body {
        font-family: monospace;
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }
      .test {
        margin: 10px 0;
        padding: 10px;
        border-left: 4px solid #ccc;
      }
      .test.pass {
        border-color: #28a745;
        background: #d4edda;
      }
      .test.fail {
        border-color: #dc3545;
        background: #f8d7da;
      }
      .test.running {
        border-color: #ffc107;
        background: #fff3cd;
      }
      .summary {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>🧪 Kaleidoswap SDK - Integration Tests</h1>
    <div id="tests"></div>
    <div id="summary" class="summary"></div>

    <script type="module">
      import init, {
        KaleidoClient,
        KaleidoConfig,
        getVersion,
        getSdkName,
        toSmallestUnits,
        toDisplayUnits,
      } from '../pkg-web/kaleidoswap_web.js';

      const tests = [];
      const results = { passed: 0, failed: 0, total: 0 };

      function test(name, fn) {
        tests.push({ name, fn });
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message || 'Assertion failed');
        }
      }

      function assertEquals(actual, expected, message) {
        if (actual !== expected) {
          throw new Error(message || `Expected ${expected}, got ${actual}`);
        }
      }

      function assertNotNull(value, message) {
        if (value === null || value === undefined) {
          throw new Error(message || 'Value is null or undefined');
        }
      }

      // ============================================================================
      // Tests
      // ============================================================================

      test('SDK Version', async () => {
        const version = getVersion();
        assertNotNull(version, 'Version should not be null');
        assert(version.startsWith('0.'), 'Version should start with 0.');
      });

      test('SDK Name', async () => {
        const name = getSdkName();
        assertEquals(name, 'kaleidoswap-sdk', 'SDK name should be kaleidoswap-sdk');
      });

      test('Config Creation - Defaults', async () => {
        const config = KaleidoConfig.withDefaults('https://api.test.com');
        assertEquals(config.getBaseUrl(), 'https://api.test.com', 'Base URL should match');
      });

      test('Config Creation - Custom', async () => {
        const config = new KaleidoConfig(
          'https://api.test.com',
          'http://node.test.com',
          'test_key',
          60.0,
          5,
          120,
        );
        assertEquals(config.getBaseUrl(), 'https://api.test.com', 'Base URL should match');
      });

      test('Config Setters', async () => {
        const config = KaleidoConfig.withDefaults('https://api.test.com');
        config.setNodeUrl('http://node.test.com');
        config.setApiKey('test_key');
        assertEquals(config.getBaseUrl(), 'https://api.test.com', 'Base URL should not change');
      });

      test('Client Creation', async () => {
        const config = KaleidoConfig.withDefaults('https://api.regtest.kaleidoswap.com');
        const client = new KaleidoClient(config);
        assertNotNull(client, 'Client should be created');
      });

      test('Client Has Node', async () => {
        const config = KaleidoConfig.withDefaults('https://api.regtest.kaleidoswap.com');
        const client = new KaleidoClient(config);
        assertEquals(client.hasNode(), false, 'Client should not have node by default');
      });

      test('Unit Conversion - To Smallest', async () => {
        const result = toSmallestUnits(1.0, 8);
        assertEquals(result, 100000000, 'Should convert to satoshis');
      });

      test('Unit Conversion - To Display', async () => {
        const result = toDisplayUnits(100000000, 8);
        assertEquals(result, 1.0, 'Should convert to BTC');
      });

      // Integration tests (require actual API)
      test('List Assets (Integration)', async () => {
        const config = KaleidoConfig.withDefaults('https://api.regtest.kaleidoswap.com');
        const client = new KaleidoClient(config);

        const assets = await client.listAssets();
        assertNotNull(assets, 'Assets should not be null');
        assert(Array.isArray(assets), 'Assets should be an array');
      });

      test('List Active Assets (Integration)', async () => {
        const config = KaleidoConfig.withDefaults('https://api.regtest.kaleidoswap.com');
        const client = new KaleidoClient(config);

        const assets = await client.listActiveAssets();
        assertNotNull(assets, 'Active assets should not be null');
        assert(Array.isArray(assets), 'Active assets should be an array');
      });

      test('List Pairs (Integration)', async () => {
        const config = KaleidoConfig.withDefaults('https://api.regtest.kaleidoswap.com');
        const client = new KaleidoClient(config);

        const pairs = await client.listPairs();
        assertNotNull(pairs, 'Pairs should not be null');
        assert(Array.isArray(pairs), 'Pairs should be an array');
      });

      // ============================================================================
      // Test Runner
      // ============================================================================

      async function runTests() {
        const testsDiv = document.getElementById('tests');
        const summaryDiv = document.getElementById('summary');

        // Initialize WASM
        await init();

        for (const { name, fn } of tests) {
          results.total++;
          const testDiv = document.createElement('div');
          testDiv.className = 'test running';
          testDiv.innerHTML = `<strong>${name}</strong> - Running...`;
          testsDiv.appendChild(testDiv);

          try {
            await fn();
            testDiv.className = 'test pass';
            testDiv.innerHTML = `<strong>✓ ${name}</strong> - Passed`;
            results.passed++;
          } catch (error) {
            testDiv.className = 'test fail';
            testDiv.innerHTML = `<strong>✗ ${name}</strong> - Failed: ${error.message}`;
            results.failed++;
          }
        }

        // Show summary
        const passRate = ((results.passed / results.total) * 100).toFixed(1);
        summaryDiv.innerHTML = `
                <h2>Test Summary</h2>
                <p>
                    <strong>Total:</strong> ${results.total} |
                    <strong style="color: #28a745">Passed:</strong> ${results.passed} |
                    <strong style="color: #dc3545">Failed:</strong> ${results.failed} |
                    <strong>Pass Rate:</strong> ${passRate}%
                </p>
            `;
      }

      runTests().catch((error) => {
        document.getElementById('tests').innerHTML = `
                <div class="test fail">
                    <strong>Fatal Error</strong>: ${error.message}
                </div>
            `;
      });
    </script>
  </body>
</html>
