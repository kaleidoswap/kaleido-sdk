[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kaleidoswap-sdk"
version = "0.5.2"
description = "Python SDK for the Kaleidoswap protocol - Trade RGB assets on Lightning Network"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Kaleidoswap", email = "dev@kaleidoswap.com" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
keywords = ["bitcoin", "lightning", "rgb", "swap", "trading", "sdk"]
dependencies = [
    "httpx>=0.27.0",
    "websockets>=12.0",
    "pydantic[email]>=2.0",
    "attrs>=23.0",  # Required by auto-generated clients
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "mypy>=1.0",
    "ruff>=0.1.0",
    "datamodel-code-generator>=0.25",
    "openapi-python-client>=0.21.0",
]

[project.urls]
Homepage = "https://kaleidoswap.com"
Documentation = "https://docs.kaleidoswap.com"
Repository = "https://github.com/kaleidoswap/kaleido-sdk"

[tool.hatch.build.targets.wheel]
packages = ["kaleidoswap_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
]

[tool.mypy]
python_version = "3.10"
strict = false
warn_return_any = false
warn_unused_ignores = true
disallow_untyped_defs = false
plugins = ["pydantic.mypy"]
exclude = [
    "kaleidoswap_sdk/_generated/",
]

[[tool.mypy.overrides]]
module = "websockets.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "dateutil.*"
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py310"
# Exclude generated files from formatting (they're auto-generated with datamodel-code-generator)
exclude = [
    "kaleidoswap_sdk/_generated/",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Ignore certain rules in auto-generated code
"kaleidoswap_sdk/_generated/**/*.py" = [
    "F403",  # Star imports
    "F405",  # Undefined names from star imports
    "N818",  # Exception naming conventions
    "UP007", # Use X | Y for type annotations
    "E501",  # Line too long
]
