version: 2
updates:
  # TypeScript/npm dependencies
  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "typescript"
    commit-message:
      prefix: "chore(deps-ts)"
      include: "scope"
    ignore:
      # Ignore major version updates for testing libraries temporarily
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ts-jest"
        update-types: ["version-update:semver-major"]

  # Python/pip dependencies
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps-py)"
      include: "scope"
    ignore:
      # Ignore major version updates for testing libraries temporarily
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]

  # Rust/cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps-rust)"
      include: "scope"
    ignore:
      # Ignore major version updates for core libraries
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps-ci)"
      include: "scope"

