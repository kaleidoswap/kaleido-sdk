name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.75'

jobs:
  # Lint TypeScript SDK
  lint-typescript:
    name: Lint TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Check formatting
        run: npm run format:check
      
      - name: Type check
        run: npm run typecheck

  # Build TypeScript SDK
  build-typescript:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    needs: lint-typescript
    defaults:
      run:
        working-directory: typescript
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: typescript/dist
          retention-days: 7

  # Test TypeScript SDK
  test-typescript:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    needs: build-typescript
    defaults:
      run:
        working-directory: typescript
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./typescript/coverage/cobertura-coverage.xml
          flags: typescript
          name: typescript-coverage
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-test-results
          path: typescript/coverage
          retention-days: 7

  # Lint Python SDK
  lint-python:
    name: Lint Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      
      - name: Run Ruff check
        run: uv run ruff check .
      
      - name: Run Ruff format check
        run: uv run ruff format --check .
      
      - name: Run Black check
        run: uv run black --check .
      
      - name: Run mypy (if configured)
        run: uv run mypy kaleidoswap_sdk || true
        continue-on-error: true

  # Build Python SDK
  build-python:
    name: Build Python SDK
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: python
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      
      - name: Build distribution
        run: uv build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist
          retention-days: 7

  # Test Python SDK
  test-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    needs: build-python
    defaults:
      run:
        working-directory: python
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      
      - name: Run tests
        run: uv run pytest tests/ --cov=kaleidoswap_sdk --cov-report=xml --cov-report=html --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./python/coverage.xml
          flags: python
          name: python-coverage
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: python/htmlcov
          retention-days: 7

  # Lint Rust SDK
  lint-rust:
    name: Lint Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Build Rust SDK
  build-rust:
    name: Build Rust SDK
    runs-on: ubuntu-latest
    needs: lint-rust
    defaults:
      run:
        working-directory: rust
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Build
        run: cargo build --release
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-target
          path: rust/target/release
          retention-days: 7

  # Test Rust SDK
  test-rust:
    name: Test Rust SDK
    runs-on: ubuntu-latest
    needs: build-rust
    defaults:
      run:
        working-directory: rust
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Run tests
        run: cargo test --all-features
      
      - name: Generate coverage (optional)
        run: cargo test --all-features --no-fail-fast
        continue-on-error: true

  # Check OpenAPI spec generation
  check-openapi-generation:
    name: Check OpenAPI Generation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Check for manual edits in generated code
        run: |
          # This is a placeholder - implement actual check
          echo "Checking for manual edits in generated directories..."
          # Add logic to verify generated code hasn't been manually edited

  # Summary job
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - test-typescript
      - test-python
      - test-rust
      - check-openapi-generation
    if: always()
    
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed successfully!"

