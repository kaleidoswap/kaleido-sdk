name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Detect changed paths (always runs so downstream jobs are never auto-skipped) ─
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      specs-changed: ${{ steps.filter.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            specs:
              - 'specs/**'
              - 'scripts/generate_*.sh'

  # ── Regenerate SDK models when specs/scripts change (push only) ─────────────
  generate-sdk-models:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.specs-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: typescript-sdk/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install generation dependencies
        run: |
          npm install -g openapi-typescript
          pip install 'datamodel-code-generator[ruff]'
      - name: Sync Python SDK
        working-directory: python-sdk
        run: uv sync --frozen --all-extras --dev
      - name: Generate TypeScript types
        run: bash scripts/generate_typescript_types.sh
      - name: Generate Python SDK models
        run: bash scripts/generate_python_sdk_models.sh
      - name: Upload generated models
        uses: actions/upload-artifact@v4
        with:
          name: generated-sdk-models
          path: |
            typescript-sdk/src/generated/
            python-sdk/kaleidoswap_sdk/_generated/
          retention-days: 7

  # ── Check generated models are up-to-date (PR only) ─────────────────────────
  check-generated-models:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: typescript-sdk/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install generation dependencies
        run: |
          npm install -g openapi-typescript
          pip install 'datamodel-code-generator[ruff]'
      - name: Sync Python SDK
        working-directory: python-sdk
        run: uv sync --frozen --all-extras --dev
      - name: Generate TypeScript types
        run: bash scripts/generate_typescript_types.sh
      - name: Generate Python SDK models
        run: bash scripts/generate_python_sdk_models.sh
      - name: Check for drift
        run: |
          if ! git diff --quiet typescript-sdk/src/generated/ python-sdk/kaleidoswap_sdk/_generated/; then
            echo "Generated models are out of date!"
            echo "Run 'make generate-models' locally and commit the changes."
            git diff --stat typescript-sdk/src/generated/ python-sdk/kaleidoswap_sdk/_generated/
            exit 1
          fi
          echo "Generated models are up-to-date"

  # ── TypeScript SDK ───────────────────────────────────────────────────────────
  test-typescript-sdk:
    runs-on: ubuntu-latest
    needs: [generate-sdk-models]
    if: always() && !failure() && !cancelled()
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: typescript-sdk/pnpm-lock.yaml
      - name: Download generated models (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download ${{ github.run_id }} --name generated-sdk-models 2>/dev/null || true
      - name: Install dependencies
        working-directory: typescript-sdk
        run: pnpm install
      - name: Test
        working-directory: typescript-sdk
        run: pnpm test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typescript-test-results
          path: typescript-sdk/test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TypeScript SDK Tests
          path: typescript-sdk/test-results.xml
          reporter: jest-junit
          fail-on-error: false

  check-typescript-sdk:
    runs-on: ubuntu-latest
    needs: [generate-sdk-models]
    if: always() && !failure() && !cancelled()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: typescript-sdk/pnpm-lock.yaml
      - name: Download generated models (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download ${{ github.run_id }} --name generated-sdk-models 2>/dev/null || true
      - name: Install dependencies
        working-directory: typescript-sdk
        run: pnpm install
      - name: Lint, typecheck and format
        working-directory: typescript-sdk
        run: |
          pnpm run lint
          pnpm run typecheck
          pnpm run format:check

  # ── Python SDK ───────────────────────────────────────────────────────────────
  test-python-sdk:
    runs-on: ubuntu-latest
    needs: [generate-sdk-models]
    if: always() && !failure() && !cancelled()
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download generated models (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download ${{ github.run_id }} --name generated-sdk-models 2>/dev/null || true
      - name: Install dependencies
        working-directory: python-sdk
        run: pip install -e ".[dev]"
      - name: Test
        working-directory: python-sdk
        run: pytest tests/ -v --junitxml=test-results.xml --ignore=tests/integration -m "not integration"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: python-sdk/test-results.xml
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python SDK Tests
          path: python-sdk/test-results.xml
          reporter: java-junit
          fail-on-error: false

  check-python-sdk:
    runs-on: ubuntu-latest
    needs: [generate-sdk-models]
    if: always() && !failure() && !cancelled()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - name: Download generated models (if available)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download ${{ github.run_id }} --name generated-sdk-models 2>/dev/null || true
      - name: Check formatting, linting and type checking
        run: |
          make check-format-python
          make check-lint-python
          make typecheck-python
