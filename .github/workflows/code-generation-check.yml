name: Code Generation Check

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'specs/**'
      - 'scripts/generate-*.sh'
      - 'scripts/update-openapi-specs.sh'
      - 'typescript/src/generated/**'
      - 'python/kaleidoswap_sdk/generated/**'
  workflow_dispatch:

jobs:
  check-generated-code:
    name: Check Generated Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install TypeScript generator dependencies
        run: |
          cd typescript
          npm ci
      
      - name: Install Python generator dependencies
        run: |
          cd python
          uv sync --frozen --extra dev
      
      - name: Install OpenAPI generators
        run: |
          # Install openapi-typescript-codegen for TypeScript
          npm install -g @hey-api/openapi-ts
          
          # Install openapi-python-client for Python
          uv tool install openapi-python-client
      
      - name: Store current generated code
        run: |
          mkdir -p /tmp/generated-backup
          cp -r typescript/src/generated /tmp/generated-backup/typescript-generated || true
          cp -r python/kaleidoswap_sdk/generated /tmp/generated-backup/python-generated || true
      
      - name: Regenerate code from OpenAPI specs
        run: |
          bash scripts/generate-typescript.sh || echo "TypeScript generation skipped"
          bash scripts/generate-python.sh || echo "Python generation skipped"
      
      - name: Check for differences in generated code
        id: check_diff
        run: |
          # Check TypeScript
          if [ -d "/tmp/generated-backup/typescript-generated" ]; then
            if ! diff -r /tmp/generated-backup/typescript-generated typescript/src/generated > /tmp/ts-diff.txt 2>&1; then
              echo "typescript_changed=true" >> $GITHUB_OUTPUT
              echo "⚠️  TypeScript generated code has differences"
            else
              echo "typescript_changed=false" >> $GITHUB_OUTPUT
              echo "✅ TypeScript generated code is up to date"
            fi
          fi
          
          # Check Python
          if [ -d "/tmp/generated-backup/python-generated" ]; then
            if ! diff -r /tmp/generated-backup/python-generated python/kaleidoswap_sdk/generated > /tmp/py-diff.txt 2>&1; then
              echo "python_changed=true" >> $GITHUB_OUTPUT
              echo "⚠️  Python generated code has differences"
            else
              echo "python_changed=false" >> $GITHUB_OUTPUT
              echo "✅ Python generated code is up to date"
            fi
          fi
      
      - name: Show differences if any
        if: steps.check_diff.outputs.typescript_changed == 'true' || steps.check_diff.outputs.python_changed == 'true'
        run: |
          echo "## ⚠️  Generated Code Differences Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_diff.outputs.typescript_changed }}" == "true" ]; then
            echo "### TypeScript Generated Code" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
            head -100 /tmp/ts-diff.txt >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.check_diff.outputs.python_changed }}" == "true" ]; then
            echo "### Python Generated Code" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
            head -100 /tmp/py-diff.txt >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### Action Required" >> $GITHUB_STEP_SUMMARY
          echo "The generated code in your PR doesn't match what would be generated from the current OpenAPI specs." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please run the following commands to regenerate the code:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "make generate" >> $GITHUB_STEP_SUMMARY
          echo "# or individually:" >> $GITHUB_STEP_SUMMARY
          echo "make generate-typescript" >> $GITHUB_STEP_SUMMARY
          echo "make generate-python" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Check for manual edits in generated directories
        id: check_manual_edits
        run: |
          echo "Checking for potential manual edits in generated code..."
          
          # This is a simple check - can be enhanced
          # Look for common patterns that suggest manual editing
          MANUAL_EDITS_FOUND=false
          
          # Check for TODO comments in generated code
          if grep -r "TODO:" typescript/src/generated/ 2>/dev/null | grep -v "node_modules"; then
            echo "⚠️  Found TODO comments in TypeScript generated code"
            MANUAL_EDITS_FOUND=true
          fi
          
          if grep -r "TODO:" python/kaleidoswap_sdk/generated/ 2>/dev/null | grep -v "__pycache__"; then
            echo "⚠️  Found TODO comments in Python generated code"
            MANUAL_EDITS_FOUND=true
          fi
          
          # Check for FIXME comments
          if grep -r "FIXME:" typescript/src/generated/ 2>/dev/null | grep -v "node_modules"; then
            echo "⚠️  Found FIXME comments in TypeScript generated code"
            MANUAL_EDITS_FOUND=true
          fi
          
          if grep -r "FIXME:" python/kaleidoswap_sdk/generated/ 2>/dev/null | grep -v "__pycache__"; then
            echo "⚠️  Found FIXME comments in Python generated code"
            MANUAL_EDITS_FOUND=true
          fi
          
          if [ "$MANUAL_EDITS_FOUND" = true ]; then
            echo "manual_edits=true" >> $GITHUB_OUTPUT
            echo "## ⚠️  Potential Manual Edits Detected" >> $GITHUB_STEP_SUMMARY
            echo "Found comments (TODO/FIXME) in generated code directories." >> $GITHUB_STEP_SUMMARY
            echo "Generated code should not be edited manually!" >> $GITHUB_STEP_SUMMARY
          else
            echo "manual_edits=false" >> $GITHUB_OUTPUT
            echo "✅ No obvious manual edits detected in generated code"
          fi
      
      - name: Fail if generated code is out of sync
        if: steps.check_diff.outputs.typescript_changed == 'true' || steps.check_diff.outputs.python_changed == 'true'
        run: |
          echo "❌ Generated code is out of sync with OpenAPI specs"
          echo "Please regenerate the code using: make generate"
          exit 1
      
      - name: Warn if manual edits detected
        if: steps.check_manual_edits.outputs.manual_edits == 'true'
        run: |
          echo "⚠️  Warning: Potential manual edits detected in generated code"
          echo "This is discouraged. Please make changes in wrapper code instead."
          # Don't fail, just warn
          exit 0
      
      - name: Success summary
        if: steps.check_diff.outputs.typescript_changed != 'true' && steps.check_diff.outputs.python_changed != 'true'
        run: |
          echo "## ✅ Generated Code Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "All generated code is up to date with OpenAPI specs." >> $GITHUB_STEP_SUMMARY

