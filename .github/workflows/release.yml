name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.75'

jobs:
  # Validate release
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from tag or input
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Check if prerelease
        id: check_prerelease
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release version"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release"
          fi
      
      - name: Check version consistency
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          
          # Check TypeScript package.json
          TS_VERSION=$(node -p "require('./typescript/package.json').version")
          if [ "$TS_VERSION" != "$VERSION" ]; then
            echo "❌ TypeScript version ($TS_VERSION) doesn't match release version ($VERSION)"
            exit 1
          fi
          
          # Check Python pyproject.toml
          PY_VERSION=$(grep '^version\s*=' python/pyproject.toml | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          if [ "$PY_VERSION" != "$VERSION" ]; then
            echo "❌ Python version ($PY_VERSION) doesn't match release version ($VERSION)"
            exit 1
          fi
          
          # Check Rust Cargo.toml
          RUST_VERSION=$(grep '^version\s*=' rust/Cargo.toml | head -1 | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')
          if [ "$RUST_VERSION" != "$VERSION" ]; then
            echo "❌ Rust version ($RUST_VERSION) doesn't match release version ($VERSION)"
            exit 1
          fi
          
          echo "✅ All SDK versions match: $VERSION"

  # Build and test all SDKs
  build-and-test:
    name: Build and Test All SDKs
    needs: validate
    uses: ./.github/workflows/ci.yml

  # Publish TypeScript to npm
  publish-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    defaults:
      run:
        working-directory: typescript
    environment:
      name: npm
      url: https://www.npmjs.com/package/kaleidoswap-sdk
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Determine npm tag
        id: npm_tag
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          if [[ "${{ needs.validate.outputs.is_prerelease }}" == "true" ]]; then
            if [[ "$VERSION" =~ alpha ]]; then
              echo "tag=alpha" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" =~ beta ]]; then
              echo "tag=beta" >> $GITHUB_OUTPUT
            elif [[ "$VERSION" =~ rc ]]; then
              echo "tag=rc" >> $GITHUB_OUTPUT
            else
              echo "tag=next" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish to npm
        run: npm publish --tag ${{ steps.npm_tag.outputs.tag }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create npm release summary
        run: |
          echo "✅ Published kaleidoswap-sdk@${{ needs.validate.outputs.version }} to npm with tag: ${{ steps.npm_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

  # Publish Python to PyPI
  publish-python:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    defaults:
      run:
        working-directory: python
    environment:
      name: pypi
      url: https://pypi.org/project/kaleidoswap-sdk/
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Build distribution
        run: uv build
      
      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
      
      - name: Create PyPI release summary
        run: |
          echo "✅ Published kaleidoswap-sdk@${{ needs.validate.outputs.version }} to PyPI" >> $GITHUB_STEP_SUMMARY

  # Publish Rust to crates.io
  publish-rust:
    name: Publish Rust SDK to crates.io
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    defaults:
      run:
        working-directory: rust
    environment:
      name: crates-io
      url: https://crates.io/crates/kaleidoswap-sdk
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
      
      - name: Create crates.io release summary
        run: |
          echo "✅ Published kaleidoswap-sdk@${{ needs.validate.outputs.version }} to crates.io" >> $GITHUB_STEP_SUMMARY

  # Create GitHub Release
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish-typescript, publish-python, publish-rust]
    if: always() && ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          
          # Extract changelog for this version
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          
          # If no specific changelog found, generate from git commits
          if [ ! -s release_notes.md ]; then
            echo "## What's Changed" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md
          fi
          
          cat release_notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create release summary
        run: |
          echo "## 🎉 Release v${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published to:" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 npm: https://www.npmjs.com/package/kaleidoswap-sdk/v/${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🐍 PyPI: https://pypi.org/project/kaleidoswap-sdk/${{ needs.validate.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
          echo "- 🦀 crates.io: https://crates.io/crates/kaleidoswap-sdk/${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 GitHub: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  # Dry run summary
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: ${{ github.event.inputs.dry_run == 'true' }}
    
    steps:
      - name: Create dry run summary
        run: |
          echo "## 🔍 Dry Run - Release v${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed! Ready to release:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version consistency validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All SDKs built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Would publish to:**" >> $GITHUB_STEP_SUMMARY
          echo "- npm (tag: ${{ needs.validate.outputs.is_prerelease == 'true' && 'beta' || 'latest' }})" >> $GITHUB_STEP_SUMMARY
          echo "- PyPI" >> $GITHUB_STEP_SUMMARY
          echo "- crates.io" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Releases" >> $GITHUB_STEP_SUMMARY

